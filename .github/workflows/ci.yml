name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wm_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wm_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wm_platform?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_JWT_SECRET: ci-test-secret-min-16-chars

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: API unit tests
        working-directory: apps/platform/api
        run: pnpm test

      - name: Prepare database
        working-directory: apps/platform/api
        run: |
          pnpm exec prisma migrate deploy
          pnpm db:seed

      - name: Build API for E2E
        working-directory: apps/platform/api
        run: pnpm build

      - name: Start API
        working-directory: apps/platform/api
        env:
          API_PORT: 3000
          NODE_ENV: test
        run: |
          node dist/main.js > /tmp/wm-api.log 2>&1 &
          echo $! > /tmp/wm-api.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/wm-api.log || true
          exit 1

      - name: E2E smoke
        working-directory: apps/platform/api
        env:
          E2E_REQUIRED: 'true'
          E2E_API_BASE_URL: http://localhost:3000
        run: pnpm test:e2e

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/wm-api.pid ]; then
            kill "$(cat /tmp/wm-api.pid)" || true
          fi
