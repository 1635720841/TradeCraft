# 本地开发基础设施
# 启动：docker compose up -d
# 停止：docker compose down
# 停止并清数据：docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: wm-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wm_platform
    volumes:
      - wm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wm_platform']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - wm_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  wm_postgres_data:
  wm_redis_data:
