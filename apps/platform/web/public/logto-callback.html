<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Logto 登录跳转中…</title>
    <script>
      (function () {
        var search = window.location.search;
        if (!search) {
          window.location.replace("/#/login");
          return;
        }
        window.location.replace("/#/login/callback" + search);
      })();
    </script>
  </head>
  <body>
    <p>正在完成 Logto 登录，请稍候…</p>
  </body>
</html>
